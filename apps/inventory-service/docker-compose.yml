#version: '3.8'

services:
  inventory-service:
    build:
      context: .
      dockerfile: apps/inventory-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sneakers_inventory
      - SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS=kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - ecommerce-network

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sneakers_inventory # Banco inicial criado automaticamente
    networks:
      - ecommerce-network

  # Adicione o container do Apache Kafka (KRaft mode) que havíamos planejado
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND=true
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

  # ... (Mantenha os outros serviços como mongodb, catalog-service e ollama que já configuramos)