server:
  port: 8085

spring:
  application:
    name: store-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommshoe_stores
    username: root
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/