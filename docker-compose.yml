services:
  # 1. SERVER DISCOVERY (EUREKA) - O primeiro a subir
  discovery-server:
    build:
      context: .
      dockerfile: apps/discovery-server/Dockerfile # Lembre-se de criar o Dockerfile dele igual aos outros
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network

  # 2. API GATEWAY - Porta de entrada na porta 8080
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
    networks:
      - ecommerce-network

  # 3. CATALOG SERVICE (MongoDB Vector Search + Ollama)
  catalog-service:
    build:
      context: .
      dockerfile: apps/catalog-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:password@mongodb:27017/catalog?authSource=admin
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS=kafka:9092
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
      - mongodb
      - kafka
      - ollama
    networks:
      - ecommerce-network

  # 4. INVENTORY SERVICE (PostgreSQL + Kafka)
  inventory-service:
    build:
      context: .
      dockerfile: apps/inventory-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sneakers_inventory
      - SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS=kafka:9092
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
      - postgres
      - kafka
    networks:
      - ecommerce-network

  # === INFRAESTRUTURA DE BANCOS E MENSAGERIA ===

  mongodb:
    image: mongodb/mongodb-community-server:8.0-ubi8
    ports:
      - "27017:27017"
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=root
      - MONGODB_INITDB_ROOT_PASSWORD=password
    networks:
      - ecommerce-network

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sneakers_inventory
    networks:
      - ecommerce-network

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    networks:
      - ecommerce-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 5 && ollama run llava && tail -f /dev/null" ]
    networks:
      - ecommerce-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: keycloak
    ports:
      - "8083:8083"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=dev-file # Banco embarcado para desenvolvimento rápido
    command: start-dev
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  ollama_data: